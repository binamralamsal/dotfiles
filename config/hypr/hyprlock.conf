general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/dotfiles/assets/wallpaper.jpg

    blur_passes = 3
    blur_size = 8

    brightness = 0.85
    contrast = 1.0
    vibrancy = 0.15
}

shape {
    monitor =
    size = 260, 260

    color = rgba(fff8e0aa)

    rounding = -1

    position = 0, 40
    halign = center
    valign = center

    zindex = 0
}

label {
    monitor =

    text = cmd[update:60000] date "+%A, %B %-d"

    color = rgba(efe5c8dd)

    font_size = 16
    font_family = Libre Baskerville

    position = 0, 250
    halign = center
    valign = center

    zindex = 2
}

label {
    monitor =

    text = $TIME

    color = rgba(efe5c8ff)

    font_size = 96
    font_family = Libre Baskerville

    position = 0, 170
    halign = center
    valign = center

    zindex = 2
}

input-field {
    monitor =

    size = 280, 22

    outline_thickness = 0

    outer_color = rgba(0,0,0,0)
    inner_color = rgba(0,0,0,0.65)

    font_color = rgba(efe5c8ff)

    fade_on_empty = false

    hide_input = true

    rounding = 3

    check_color = rgba(efe5c8ff)
    fail_color = rgba(ff7777ff)

    position = 0, -70
    halign = center
    valign = center

    zindex = 2
}

label {
    monitor =

    text = $USER

    color = rgba(efe5c8cc)

    font_size = 14
    font_family = Libre Baskerville

    position = 0, -110
    halign = center
    valign = center

    zindex = 2
}

shape {
    monitor =

    size = 240, 70

    color = rgba(0f0f0fcc)

    rounding = 8

    position = 0, -190
    halign = center
    valign = center

    zindex = 1
}

label {
    monitor =

    text = cmd[update:1000] playerctl metadata --format '{{ title }}' 2>/dev/null

    color = rgba(efe5c8ff)

    font_size = 13
    font_family = Libre Baskerville

    position = 0, -180
    halign = center
    valign = center

    zindex = 2
}

label {
    monitor =

    text = cmd[update:1000] playerctl metadata --format '{{ artist }}' 2>/dev/null

    color = rgba(efe5c8aa)

    font_size = 11
    font_family = Libre Baskerville

    position = 0, -205
    halign = center
    valign = center

    zindex = 2
}
