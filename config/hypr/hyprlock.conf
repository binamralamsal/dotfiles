general {
    hide_cursor = true
    ignore_empty_input = false
}

background {
    path = ~/dotfiles/assets/wallpaper.jpg
    blur_passes = 0
}

# ── Date ─────────────────────────────────────────────────────────────────────
label {
    text = cmd[update:60000] date +"%A, %B %-d"
    color = rgba(175, 195, 215, 0.8)
    font_size = 16
    font_family = Libre Baskerville

    position = 0, -120
    halign = center
    valign = top
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    text = $TIME
    color = rgba(215, 228, 240, 0.8)
    font_size = 90
    font_family = Libre Baskerville Bold

    position = 0, -148
    halign = center
    valign = top
}

# ── Input field ───────────────────────────────────────────────────────────────
input-field {
    size = 260, 52

    outline_thickness = 1
    rounding = 8

    outer_color  = rgba(236, 228, 210, 0.18)
    inner_color  = rgba(15, 13, 10, 0.45)
    font_color   = rgba(236, 228, 210, 1.0)
    font_family  = Libre Baskerville

    dots_size     = 0.20
    dots_spacing  = 0.22
    dots_center   = true
    dots_rounding = -1

    placeholder_text = <span foreground="##a09888" font_style="italic" font_size="11pt">Password</span>

    fade_on_empty = true
    fade_timeout  = 1800

    check_color = rgba(210, 195, 155, 0.70)
    fail_color  = rgba(185, 80, 72, 0.80)
    fail_text   = <span font_style="italic" font_size="10pt">$FAIL</span>

    position = 0, 0
    halign = center
    valign = center
}
